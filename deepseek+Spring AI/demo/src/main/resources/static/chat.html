<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      height: 100vh;
      display: flex;
    }

    /* Sidebar */
    .sidebar {
      width: 260px;
      background: #f9fafb;
      border-right: 1px solid #e5e7eb;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid #e5e7eb;
    }
    .sidebar-header button {
      width: 100%;
      padding: 10px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .sidebar-header button:hover { background: #4338ca; }
    .conversation-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .conv-item {
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      color: #374151;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 2px;
      transition: background 0.15s;
    }
    .conv-item:hover { background: #e5e7eb; }
    .conv-item.active { background: #e0e7ff; color: #4338ca; font-weight: 500; }
    .conv-item .id-tag {
      font-size: 10px;
      color: #9ca3af;
      font-family: monospace;
    }
    .conv-item.active .id-tag { color: #6366f1; }

    /* Main chat */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #fff;
      min-width: 0;
    }
    .chat-header {
      padding: 12px 16px;
      border-bottom: 1px solid #e8e8e8;
      background: #fafafa;
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .chat-header .title {
      flex: 1;
    }
    .btn-sm {
      padding: 6px 14px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      background: #fff;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-sm:hover { background: #e5e7eb; }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .message {
      display: flex;
      gap: 10px;
      max-width: 80%;
    }
    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
    .message.ai {
      align-self: flex-start;
    }
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
    }
    .message.user .avatar { background: #4f46e5; color: #fff; }
    .message.ai .avatar { background: #e8e8e8; color: #333; }
    .bubble {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .message.user .bubble { background: #4f46e5; color: #fff; border-bottom-right-radius: 4px; }
    .message.ai .bubble { background: #f0f0f0; color: #333; border-bottom-left-radius: 4px; }
    .message.ai .bubble.streaming::after {
      content: '';
      display: inline-block;
      width: 8px;
      height: 16px;
      background: #333;
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.8s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    .chat-footer {
      padding: 16px 20px;
      border-top: 1px solid #e8e8e8;
      display: flex;
      gap: 10px;
    }
    .chat-footer input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 20px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .chat-footer input:focus { border-color: #4f46e5; }
    .chat-footer button {
      padding: 10px 24px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .chat-footer button:hover { background: #4338ca; }
    .chat-footer button:disabled { background: #aaa; cursor: not-allowed; }
    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="sidebar-header">
      <button onclick="newConversation()">+ New Chat</button>
    </div>
    <div class="conversation-list" id="convList"></div>
  </div>

  <div class="chat-container">
    <div class="chat-header">
      <span class="title" id="chatTitle">Select or create a conversation</span>
      <button class="btn-sm" onclick="loadHistory()">Load History</button>
      <button class="btn-sm" onclick="location.href='/'">Back</button>
    </div>
    <div class="chat-messages" id="messages">
      <div class="empty-state" id="emptyHint">Send a message to start chatting</div>
    </div>
    <div class="chat-footer">
      <input id="promptInput" type="text" placeholder="Type your message..." autofocus>
      <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const promptInput = document.getElementById('promptInput');
    const sendBtn = document.getElementById('sendBtn');
    const emptyHint = document.getElementById('emptyHint');
    const convList = document.getElementById('convList');
    const chatTitle = document.getElementById('chatTitle');

    // Store messages per conversation: { convId: [{role, text}, ...] }
    const conversations = {};
    let currentConvId = null;

    promptInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !sendBtn.disabled) sendMessage();
    });

    async function loadHistory() {
      if (!currentConvId) return;
      try {
        const res = await fetch(`/ai/history/chat/${currentConvId}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const history = await res.json();
        conversations[currentConvId] = [];
        switchTo(currentConvId);
        history.forEach(m => addMessage(m.role, m.content));
        conversations[currentConvId] = history.map(m => ({ role: m.role, text: m.content }));
      } catch (err) {
        alert('Load history failed: ' + err.message);
      }
    }

    function newConversation() {
      const id = 'conv-' + Date.now();
      conversations[id] = [];
      switchTo(id);
    }

    function switchTo(convId) {
      currentConvId = convId;
      chatTitle.textContent = 'Chat: ' + convId;
      messagesEl.innerHTML = '';
      const msgs = conversations[convId] || [];
      if (msgs.length === 0) {
        messagesEl.innerHTML = '<div class="empty-state">Send a message to start chatting</div>';
      } else {
        msgs.forEach(m => addMessage(m.role, m.text));
      }
      renderSidebar();
      promptInput.focus();
    }

    function renderSidebar() {
      convList.innerHTML = '';
      Object.keys(conversations).forEach(id => {
        const div = document.createElement('div');
        div.className = 'conv-item' + (id === currentConvId ? ' active' : '');
        div.innerHTML = `Chat <span class="id-tag">${id}</span>`;
        div.onclick = () => switchTo(id);
        convList.appendChild(div);
      });
    }

    async function sendMessage() {
      const prompt = promptInput.value.trim();
      if (!prompt || !currentConvId) return;

      setSending(true);
      document.getElementById('emptyHint')?.remove();

      conversations[currentConvId].push({ role: 'user', text: prompt });
      addMessage('user', prompt);
      promptInput.value = '';

      const aiMsg = addMessage('ai', '', true);

      try {
        const url = `/ai/deepseek?prompt=${encodeURIComponent(prompt)}&tockId=${encodeURIComponent(currentConvId)}`;
        const response = await fetch(url, { method: 'POST' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let text = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          text += decoder.decode(value, { stream: true });
          aiMsg.bubble.textContent = text;
          messagesEl.scrollTop = messagesEl.scrollHeight;
        }
        conversations[currentConvId].push({ role: 'ai', text });
      } catch (err) {
        aiMsg.bubble.textContent = 'Error: ' + err.message;
      } finally {
        aiMsg.bubble.classList.remove('streaming');
        setSending(false);
        promptInput.focus();
      }
    }

    function setSending(disabled) {
      sendBtn.disabled = disabled;
      promptInput.disabled = disabled;
      sendBtn.textContent = disabled ? 'Sending...' : 'Send';
    }

    function addMessage(role, text, streaming) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.innerHTML = `
        <div class="avatar">${role === 'user' ? 'U' : 'AI'}</div>
        <div class="bubble${streaming ? ' streaming' : ''}">${text}</div>
      `;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return { bubble: div.querySelector('.bubble') };
    }

    // Start: use tockId from URL if provided, else create a new conversation.
    // Also load existing conversation IDs from the server.
    async function init() {
      const urlParams = new URLSearchParams(window.location.search);
      const presetId = urlParams.get('tockId');

      // Load server-side conversation IDs
      try {
        const res = await fetch('/ai/history/chat');
        if (res.ok) {
          const ids = await res.json();
          ids.forEach(id => {
            conversations[id] = [];
          });
        }
      } catch (e) { /* ignore */ }

      if (presetId) {
        if (!conversations[presetId]) conversations[presetId] = [];
        switchTo(presetId);
        loadHistory();
      } else if (Object.keys(conversations).length > 0) {
        switchTo(Object.keys(conversations)[0]);
        loadHistory();
      } else {
        newConversation();
      }
    }

    init();
  </script>
</body>
</html>
